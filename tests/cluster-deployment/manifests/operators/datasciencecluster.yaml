# Open Data Hub - DSCInitialization and DataScienceCluster
#
# DSCInitialization must exist before a DataScienceCluster can be created.
# The DataScienceCluster enables the datasciencepipelines component, which
# installs the DSP operator that reconciles DataSciencePipelinesApplication CRs.
#
apiVersion: dscinitialization.opendatahub.io/v1
kind: DSCInitialization
metadata:
  name: default-dsci
spec:
  applicationsNamespace: opendatahub
  monitoring:
    managementState: Removed
  serviceMesh:
    managementState: Removed
  trustedCABundle:
    managementState: Removed
---
apiVersion: datasciencecluster.opendatahub.io/v1
kind: DataScienceCluster
metadata:
  name: default-dsc
spec:
  components:
    datasciencepipelines:
      managementState: Managed
    dashboard:
      managementState: Removed
    workbenches:
      managementState: Removed
    codeflare: {}
    ray: {}
    kserve: {}
    modelmeshserving: {}
    modelregistry: {}
    trainingoperator: {}
    trustyai: {}
    kueue: {}
    feastoperator: {}
    llamastackoperator: {}
