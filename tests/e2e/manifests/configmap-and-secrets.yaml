apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeflow-ragas-config
  namespace: ragas-test
data:
  EMBEDDING_MODEL: "vllm-emulator"
  KUBEFLOW_LLAMA_STACK_URL: "http://llama-stack-service.ragas-test.svc.cluster.local:8321"
  KUBEFLOW_PIPELINES_ENDPOINT: "http://kubeflow-pipelines.ragas-test.svc.cluster.local:8080"
  KUBEFLOW_NAMESPACE: "ragas-test"
  KUBEFLOW_BASE_IMAGE: "python:3.12-slim"
  KUBEFLOW_RESULTS_S3_PREFIX: "s3://test-bucket/ragas-results"
  KUBEFLOW_S3_CREDENTIALS_SECRET_NAME: "test-s3-credentials"
---
apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-inference-model-secret
  namespace: ragas-test
type: Opaque
stringData:
  INFERENCE_MODEL: "vllm-emulator"
  VLLM_URL: "http://vllm-emulator-service.ragas-test.svc.cluster.local:8032"
  VLLM_TLS_VERIFY: "false"
  VLLM_API_TOKEN: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: kubeflow-pipelines-token
  namespace: ragas-test
type: Opaque
stringData:
  KUBEFLOW_PIPELINES_TOKEN: "test-token"
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: ragas-test
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "test-key"
  AWS_SECRET_ACCESS_KEY: "test-secret"
  AWS_DEFAULT_REGION: "us-east-1"