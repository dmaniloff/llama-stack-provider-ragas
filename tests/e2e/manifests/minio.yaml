apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: ragas-test
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: ragas-test
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: ragas-test
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          env:
            - name: HOME
              value: /tmp
          command:
            - sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until mc alias set local http://minio-service:9000 minioadmin minioadmin 2>/dev/null; do
                sleep 2
              done
              echo "MinIO is ready."
              mc mb --ignore-existing local/ragas-results
              echo "Bucket 'ragas-results' is ready."
