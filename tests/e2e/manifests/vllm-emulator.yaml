apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-emulator
  namespace: ragas-test
  labels:
    app: vllm-emulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-emulator
  template:
    metadata:
      labels:
        app: vllm-emulator
    spec:
      containers:
      - name: vllm-emulator
        image: ghcr.io/llm-d/llm-d-inference-sim:latest
        args:
        - --model
        - meta-llama/Llama-3.1-8B-Instruct
        - --port
        - "8000"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-emulator-service
  namespace: ragas-test
spec:
  selector:
    app: vllm-emulator
  ports:
    - protocol: TCP
      port: 8032
      targetPort: 8000
      name: vllm-emulator-endpoint
  type: ClusterIP